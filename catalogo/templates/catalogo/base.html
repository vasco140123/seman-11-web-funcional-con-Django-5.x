<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vasco Ramos | Ing. Software{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        nav {
            background-color: #1a1a2e;
            border-bottom: 1px solid #2a2a4a;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: #7c6fcd;
            letter-spacing: 0.5px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav ul a {
            color: #c0bfe0;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav ul a:hover {
            color: #7c6fcd;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            margin-top: 4rem;
            border-top: 1px solid #2a2a4a;
            color: #555;
            font-size: 0.85rem;
        }

        footer a {
            color: #7c6fcd;
            text-decoration: none;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <span class="logo">vasco.dev</span>
        <ul>
            <li><a href="{% url 'home' %}">Inicio</a></li>
            <li><a href="{% url 'catalogo' %}">Proyectos</a></li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>Ramos Mercado Vasco &mdash; Ingeniería de Software &mdash;
            <a href="https://github.com/vasco140123" target="_blank">GitHub</a>
        </p>
    </footer>
</body>
</html>
